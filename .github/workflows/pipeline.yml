name: Pipeline

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Pipeline command to run"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - fetch
          - transform
          - consolidate
          - allocate
      target-currency:
        description: "Target currency for consolidation"
        required: false
        default: "EUR"
        type: string
      ibkr-enabled:
        description: "Enable IBKR connector"
        required: false
        default: true
        type: boolean
      t212-enabled:
        description: "Enable Trading 212 connector"
        required: false
        default: true
        type: boolean
      xtb-enabled:
        description: "Enable XTB connector"
        required: false
        default: true
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_PREFIX: ${{ vars.S3_PREFIX || 'pipeline' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
      IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
      T212_API_KEY: ${{ secrets.T212_API_KEY }}
      T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
      PORTFOLIO_ENCRYPTION_KEY: ${{ secrets.PORTFOLIO_ENCRYPTION_KEY }}
      IBKR_ENABLED: ${{ inputs.ibkr-enabled }}
      T212_ENABLED: ${{ inputs.t212-enabled }}
      XTB_ENABLED: ${{ inputs.xtb-enabled }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pipeline]"

      - name: Diagnose S3 support
        run: |
          python -c "
          from pipeline.storage import resolve_storage
          cfg = resolve_storage()
          print('Backend:', type(cfg.backend).__name__)
          opts = cfg.storage_options or {}
          print('storage_options keys:', list(opts.keys()) if opts else 'None')
          import deltalake
          print('deltalake version:', deltalake.__version__)
          # Test if deltalake can handle S3 URLs with storage_options
          from deltalake import DeltaTable
          try:
              DeltaTable('s3://${{ secrets.S3_BUCKET }}/pipeline/raw/ibkr_snapshot', storage_options=opts)
              print('S3 URL: recognized (table not found is expected)')
          except FileNotFoundError:
              print('S3 URL: recognized (table does not exist yet, which is expected)')
          except Exception as e:
              print(f'S3 URL error: {type(e).__name__}: {e}')
          "

      - name: Run pipeline
        run: |
          python -m pipeline.run ${{ inputs.command }} --target-currency ${{ inputs.target-currency }}