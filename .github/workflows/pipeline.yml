name: Pipeline

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Pipeline command to run"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - fetch
          - transform
          - consolidate
          - allocate
      target-currency:
        description: "Target currency for consolidation"
        required: false
        default: "EUR"
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_PREFIX: ${{ vars.S3_PREFIX || 'pipeline' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
      T212_API_KEY: ${{ secrets.T212_API_KEY }}
      T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
      PORTFOLIO_ENCRYPTION_KEY: ${{ secrets.PORTFOLIO_ENCRYPTION_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pipeline]"

      - name: Run pipeline
        run: |
          python -m pipeline.run ${{ inputs.command }} --target-currency ${{ inputs.target-currency }}