name: Deploy (staging)

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-1
      ECR_REPOSITORY: investment-portfolio-pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (demo)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEMO }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEMO }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image starts
        run: |
          docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest
          docker run --rm ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest --help

      - name: Trigger demo pipeline
        id: trigger-pipeline
        run: |
          # Resolve the latest demo task definition ARNs dynamically.
          # ECS task definition families follow the pattern portfolio-pipeline-demo-{name}.
          # XTB is excluded: it requires --xtb-file and is triggered by EventBridge
          # when a file lands in S3, not by the CI/CD pipeline.
          ibkr_arn=$(aws ecs describe-task-definition --task-definition portfolio-pipeline-demo-ibkr --query 'taskDefinition.taskDefinitionArn' --output text)
          t212_arn=$(aws ecs describe-task-definition --task-definition portfolio-pipeline-demo-trading212 --query 'taskDefinition.taskDefinitionArn' --output text)
          consolidate_arn=$(aws ecs describe-task-definition --task-definition portfolio-pipeline-demo-consolidate-allocate --query 'taskDefinition.taskDefinitionArn' --output text)

          # Build the execution input matching the state machine's expected schema:
          #   connectors: [{name, task_def_arn, command}, ...]
          #   consolidate_allocate_task_def_arn: string
          #   demo: bool
          input_json=$(jq -n \
            --arg ibkr "$ibkr_arn" \
            --arg t212 "$t212_arn" \
            --arg consolidate "$consolidate_arn" \
            '{
              connectors: [
                {name: "ibkr", task_def_arn: $ibkr, command: ["run-connector", "ibkr", "--target-currency", "EUR"]},
                {name: "trading212", task_def_arn: $t212, command: ["run-connector", "trading212", "--target-currency", "EUR"]}
              ],
              consolidate_allocate_task_def_arn: $consolidate,
              demo: true
            }')

          execution_arn=$(aws stepfunctions start-execution \
            --state-machine-arn ${{ secrets.DEMO_STATE_MACHINE_ARN }} \
            --name "staging-$(echo ${{ github.sha }} | cut -c1-7)-$(date +%Y%m%d%H%M%S)" \
            --input "$input_json" \
            --query 'executionArn' \
            --output text)

          echo "execution_arn=$execution_arn" >> "$GITHUB_OUTPUT"
          echo "Step Function execution started: $execution_arn"

      - name: Wait for demo pipeline
        id: wait-pipeline
        run: |
          EXECUTION_ARN="${{ steps.trigger-pipeline.outputs.execution_arn }}"
          TIMEOUT=900   # 15 minutes
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXECUTION_ARN" \
              --query 'status' \
              --output text)

            case $STATUS in
              SUCCEEDED)
                echo "Step Function execution succeeded"
                exit 0
                ;;
              FAILED|TIMED_OUT|ABORTED)
                echo "::error::Step Function execution failed with status: $STATUS"
                # Print execution history for diagnostics.
                # ECS RunTask failures surface as TaskFailed events, but the
                # cause field contains the entire ECS task JSON (network
                # interfaces, container ARNs, etc.). Parse it to show only
                # the useful bits: exit code, stopped reason, task definition.
                echo "=== Execution History ==="

                echo "--- Task Failures ---"
                aws stepfunctions get-execution-history \
                  --execution-arn "$EXECUTION_ARN" \
                  --query 'events[?type==`TaskFailed`].taskFailedEventDetails' \
                  --output json 2>&1 | python3 -c '
                  import json,sys
                  for d in json.load(sys.stdin):
                    e=d.get("error","unknown"); c=d.get("cause","")
                    try:
                      j=json.loads(c); ct=j.get("Containers",[{}])
                      x=next((i.get("exitCode") for i in ct if i.get("exitCode") is not None),"N/A")
                      td=j.get("taskDefinitionArn","N/A").split("/")[-1]
                      sr=j.get("stoppedReason","N/A")
                      print(f"  error={e}  task={td}  exitCode={x}  reason={sr}")
                    except (json.JSONDecodeError,AttributeError):
                      print(f"  error={e}  cause={c[:500]}")
                  ' || echo "(failed to fetch TaskFailed events)"

                echo "--- Task Timeouts ---"
                aws stepfunctions get-execution-history \
                  --execution-arn "$EXECUTION_ARN" \
                  --query 'events[?type==`TaskTimedOut`].taskTimedOutEventDetails' \
                  --output json 2>&1 | python3 -c '
                  import json,sys
                  for d in json.load(sys.stdin):
                    e=d.get("error","unknown"); c=d.get("cause","")[:500]
                    print(f"  error={e}  cause={c}")
                  ' || echo "(failed to fetch TaskTimedOut events)"

                echo "--- Execution Failure ---"
                aws stepfunctions get-execution-history \
                  --execution-arn "$EXECUTION_ARN" \
                  --query 'events[?type==`ExecutionFailed`].executionFailedEventDetails' \
                  --output json 2>&1 | python3 -c '
                  import json,sys
                  for d in json.load(sys.stdin):
                    e=d.get("error","unknown"); c=d.get("cause","")[:500]
                    print(f"  error={e}  cause={c}")
                  ' || echo "(failed to fetch ExecutionFailed events)"
                exit 1
                ;;
              RUNNING)
                echo "Step Function still running ($ELAPSED/${TIMEOUT}s elapsed)..."
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
              *)
                echo "::error::Unexpected Step Function status: $STATUS"
                exit 1
                ;;
            esac
          done

          echo "::error::Step Function execution timed out after ${TIMEOUT}s"
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: |
          EXECUTION_ARN="${{ steps.trigger-pipeline.outputs.execution_arn }}"
          if [ -z "$EXECUTION_ARN" ]; then
            echo "No execution ARN available — cannot fetch logs"
            exit 0
          fi

          # Get the execution start time to scope the log query.
          # AWS CLI v2 returns startDate as epoch seconds (e.g., 1721234567.890).
          # Split into whole seconds and fractional milliseconds, pad to 3 digits.
          START_SECONDS=$(aws stepfunctions describe-execution \
            --execution-arn "$EXECUTION_ARN" \
            --query 'startDate' \
            --output text)

          if [ -z "$START_SECONDS" ]; then
            echo "::warning::Could not determine execution start time; fetching all log events"
            START_MS="0"
          else
            SECS="${START_SECONDS%%.*}"
            FRAC="${START_SECONDS#*.}"
            # Pad or truncate fractional part to exactly 3 digits
            FRAC="$(echo "${FRAC}000" | cut -c1-3)"
            START_MS="${SECS}${FRAC}"
            echo "Execution start: ${START_SECONDS}s → START_MS=${START_MS}ms"
          fi

          # Connector names that run in the CI-triggered pipeline (excludes XTB,
          # which is triggered by S3 file arrival instead).
          # Note: consolidate-allocate only runs after all connectors succeed,
          # so its log group may be empty when the pipeline failed at the
          # connector stage.
          CONNECTORS="ibkr trading212 consolidate-allocate"

          for NAME in $CONNECTORS; do
            LOG_GROUP="/ecs/portfolio-pipeline-demo-${NAME}"
            echo "=== Container logs: ${NAME} ==="
            echo "Log group: ${LOG_GROUP}"
            EVENTS=$(aws logs filter-log-events \
              --log-group-name "$LOG_GROUP" \
              --start-time "$START_MS" \
              --limit 500 \
              --query 'events[*].message' \
              --output json 2>&1) || {
              echo "::warning::Failed to fetch logs from ${LOG_GROUP}: ${EVENTS}"
              echo ""
              continue
            }
            echo "$EVENTS" | python3 -c 'import json,sys;[print(m) for m in json.load(sys.stdin)]' 2>/dev/null || echo "$EVENTS"
            echo ""
          done
