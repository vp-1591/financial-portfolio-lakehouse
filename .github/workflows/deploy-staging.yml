name: Deploy (staging)

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-1
      ECR_REPOSITORY: investment-portfolio-pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (demo)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEMO }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEMO }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image starts
        run: |
          docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest
          docker run --rm ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest --help

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .[pipeline]

      - name: Run staging pipeline
        env:
          # The state machine ARN is still stored as the DEMO_STATE_MACHINE_ARN
          # GitHub Secret (renamed to STAGING_STATE_MACHINE_ARN in Phase 4).
          # cmd_full reads STAGING_STATE_MACHINE_ARN from the environment.
          STAGING_STATE_MACHINE_ARN: ${{ secrets.DEMO_STATE_MACHINE_ARN }}
        run: |
          python -m pipeline.run full --mode staging --wait
