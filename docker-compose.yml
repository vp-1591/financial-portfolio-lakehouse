services:
  pipeline:
    build: .
    image: investment-portfolio-pipeline
    env_file:
      - path: .env
        required: false
    environment:
      - PIPELINE_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./.secrets:/app/.secrets
      # - ./xtb-reports:/data/xtb-reports:ro  # uncomment for XTB
    # No command override — use ENTRYPOINT from Dockerfile