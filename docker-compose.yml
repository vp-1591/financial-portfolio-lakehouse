services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/pipeline || true;
      "

  pipeline:
    build: .
    image: investment-portfolio-pipeline
    depends_on:
      create-bucket:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    environment:
      - S3_BUCKET=pipeline
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ALLOW_HTTP=true
    volumes:
      - ./.secrets:/app/.secrets
      # - ./xtb-reports:/data/xtb-reports:ro  # uncomment for XTB

volumes:
  minio-data: