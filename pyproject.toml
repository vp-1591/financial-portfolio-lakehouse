[project]
name = "investment-portfolio-dashboard"
version = "0.2.0"
requires-python = ">=3.11"

[project.optional-dependencies]
pipeline = [
    "deltalake>=0.20",
    "duckdb>=1.0",
    "cryptography>=42.0",
    "pyarrow>=15.0",
    "pandas>=2.0",
]
dev = [
    "pytest>=8.0",
    "investment-portfolio-dashboard[pipeline]",
]

[tool.pytest.ini_options]
addopts = "-p no:cacheprovider"
testpaths = ["tests"]